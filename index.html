<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tus Flask Upload</title>
    <script src="https://cdn.jsdelivr.net/npm/tus-js-client@4.3.1/dist/tus.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        #progress-container { display: none; margin-top: 10px; }
        progress { width: 100%; }
    </style>
</head>
<body>
    <h1>Upload File</h1>
    <input type="file" id="file-input">
    <button id="upload-button">Upload</button>

    <div id="progress-container">
        <progress id="progress-bar" value="0" max="100"></progress>
        <p id="status-text"></p>
    </div>

    <script>
        const endpoint = "{{ tus_endpoint }}";
        const fileInput = document.getElementById('file-input');
        const uploadButton = document.getElementById('upload-button');
        const progressContainer = document.getElementById('progress-container');
        const progressBar = document.getElementById('progress-bar');
        const statusText = document.getElementById('status-text');

        uploadButton.addEventListener('click', function() {
            const file = fileInput.files[0];
            if (!file) return;

            progressContainer.style.display = 'block';
            statusText.textContent = 'Starting upload...';

            const upload = new tus.Upload(file, {
                endpoint: endpoint,
                retryDelays: [0, 3000, 5000, 10000, 20000],

                metadata: {
                    filename: file.name,
                    filetype: file.type
                },
            
                storeFingerprintForResuming: true,
            
                onError: function(error) {
                    statusText.textContent = 'Upload failed: ' + error;
                },
            
                onProgress: function(bytesUploaded, bytesTotal) {
                    const percentage = ((bytesUploaded / bytesTotal) * 100).toFixed(2);
                    progressBar.value = percentage;
                    statusText.textContent = percentage + '% uploaded';
                },
            
                onSuccess: function() {
                    statusText.textContent = 'Upload finished! File: ' + upload.url;
                }
            });

            upload.findPreviousUploads().then(function(previousUploads) {
                if (previousUploads.length) {
                    upload.resumeFromPreviousUpload(previousUploads[0]);
                }
                upload.start();
            });
        });
    </script>
</body>
</html>
